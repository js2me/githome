name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-app:
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    env:
      CI: true
      ELECTRON: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend and Electron bundles
        run: pnpm build:app

      - name: Upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          if-no-files-found: error
          path: |
            dist
            dist-electron

  package:
    needs: build-app
    permissions:
      contents: read
    env:
      CI: true
      ELECTRON: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: linux
            platform: linux
          - os: windows-latest
            artifact: windows
            platform: win

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download app bundles
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: .

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js

      - name: Package desktop app
        run: pnpm package:${{ matrix.platform }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: release-artifacts

      - name: Resolve release tag
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.short_sha }}
          name: ${{ steps.vars.outputs.short_sha }}
          generate_release_notes: false
          body: |
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ${{ github.event.head_commit.message }}
          files: |
            release-artifacts/*.AppImage
            release-artifacts/*.deb
            release-artifacts/*.exe
          draft: false
          prerelease: false
