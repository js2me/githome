name: Build Electron

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: electron-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact-name: githome-linux-x86_64
          - os: macos-latest
            artifact-name: githome-macos
          - os: windows-latest
            artifact-name: githome-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm build:electron

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
