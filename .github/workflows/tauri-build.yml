name: Build Tauri

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: tauri-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ""
            artifact-name: githome-linux-x86_64
          - platform: macos-latest
            rust-target: universal-apple-darwin
            tauri-args: "--target universal-apple-darwin"
            artifact-name: githome-macos-universal

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build ${{ matrix.tauri-args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          if-no-files-found: error
          path: src-tauri/target/**/release/bundle/**/*
